# DB credentials Secret — consumed by BOTH the postgres statefulset (sets
# the initial DB user) and the api pod (connects with the same user). Keep
# only DB-related keys here; app-level config (auth, adapters) lives in
# deploy/secret.example.yaml.
#
# DO NOT commit a real Secret to git — this file is an example only.

apiVersion: v1
kind: Secret
metadata:
  name: sorack-db
  namespace: sorack
type: Opaque
stringData:
  POSTGRES_USERNAME: sorack
  POSTGRES_PASSWORD: change-me-strong-password

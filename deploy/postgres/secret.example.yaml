# Example Secret consumed by the api pod via envFrom. The api needs at
# minimum POSTGRES_USERNAME and POSTGRES_PASSWORD; optional SORACK_* entries
# (auth secret, admin password, adapter credentials) can live here too.
#
# How you create this Secret is your choice — plain `kubectl apply`,
# sealed-secrets, external-secrets, Infisical, etc. The pod just expects a
# Secret named `sorack-postgres-credentials` in the same namespace.
#
# DO NOT commit a real Secret to git — this file is an example only. Copy,
# fill in real values, and apply outside version control (or wrap with a
# secret-management tool).

apiVersion: v1
kind: Secret
metadata:
  name: sorack-postgres-credentials
  namespace: sorack
type: Opaque
stringData:
  # Required — DB credentials. Postgres StatefulSet boots with these.
  POSTGRES_USERNAME: sorack
  POSTGRES_PASSWORD: change-me-strong-password

  # Recommended — sessions survive pod restarts when this is set. Generate
  # with `openssl rand -base64 48`.
  SORACK_AUTH_SECRET: change-me-random-secret

  # Optional — pin the initial admin credentials. If you don't set
  # SORACK_ADMIN_PASSWORD, the api generates a random one on first boot and
  # logs it once (then you set it via the UI).
  # SORACK_ADMIN_USERNAME: admin
  # SORACK_ADMIN_PASSWORD: change-me

  # Optional — Proxmox VE adapter (only if you'll attach proxmox probes).
  # See the README for how to mint a PVE API token.
  # SORACK_PROXMOX_USER: "user@pam!tokenid"
  # SORACK_PROXMOX_TOKEN: "the-uuid-secret"
  # SORACK_PROXMOX_INSECURE: "true"   # self-signed cert

  # Optional — CORS allowlist (comma-separated). Leave unset for same-origin
  # deployments behind a reverse proxy.
  # SORACK_ALLOWED_ORIGINS: "https://dash.example.com,http://localhost:5173"
